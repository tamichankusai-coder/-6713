<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>現金出納帳</title>
<style>
body{
    font-family:"Yu Mincho","Hiragino Mincho ProN",serif;
    background:#f4f1ea;
    padding:30px;
}
.container{
    background:#fff;
    padding:20px;
    border:2px solid #000;
}
h1{
    text-align:center;
    margin-bottom:5px;
    letter-spacing:10px;
}
.header-info{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}
table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
}
th,td{
    border:1px solid #000;
    padding:6px;
}
th{
    background:#eaeaea;
}
td{
    text-align:right;
}
td.left{ text-align:left; }
td.center{ text-align:center; }
.balance{ font-weight:bold; }

tfoot td{
    font-weight:bold;
    background:#f0f0f0;
}

button{
    margin-top:15px;
    padding:8px 15px;
    margin-right:5px;
}

/* ===== 印刷最適化 ===== */
@media print{

    body{
        background:#fff;
        padding:0;
    }

    button{
        display:none;
    }

    input{
        border:none;
        outline:none;
    }

    /* 残高列の縦罫線を整理 */
    td:last-child,
    th:last-child{
        border-right:1px solid #000;
    }

    /* 入力欄の枠線を消して帳票化 */
    input{
        border:none;
        background:transparent;
    }

    /* 不要な縦線の視覚干渉を防止 */
    td input{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="container">
<h1>現 金 出 納 帳</h1>

<div class="header-info">
    <div>期首残高：<input type="number" id="opening" value="0"></div>
    <div>作成日：<input type="date" id="createdDate"></div>
</div>

<table id="cashbook">
<thead>
<tr>
    <th>日付</th>
    <th>摘要</th>
    <th>借方（収入）</th>
    <th>貸方（支出）</th>
    <th>残高</th>
</tr>
</thead>
<tbody id="tbody">
<tr>
    <td class="center"><input type="date"></td>
    <td class="left"><input type="text"></td>
    <td><input type="number" class="income"></td>
    <td><input type="number" class="expense"></td>
    <td class="balance">¥0</td>
</tr>
</tbody>
<tfoot>
<tr>
    <td colspan="2" class="left">合計</td>
    <td id="totalIncome">¥0</td>
    <td id="totalExpense">¥0</td>
    <td></td>
</tr>
</tfoot>
</table>

<button onclick="addRow()">行を追加</button>
<button onclick="saveData()">保存</button>
<button onclick="window.print()">印刷</button>

</div>

<script>
function formatYen(num){
    return "¥" + num.toLocaleString("ja-JP");
}

function calculate(){
    let opening = parseFloat(document.getElementById("opening").value) || 0;
    let balance = opening;
    let totalIncome = 0;
    let totalExpense = 0;

    let rows = document.querySelectorAll("#tbody tr");

    rows.forEach(row=>{
        let income = parseFloat(row.querySelector(".income").value) || 0;
        let expense = parseFloat(row.querySelector(".expense").value) || 0;

        totalIncome += income;
        totalExpense += expense;

        balance += income - expense;
        row.querySelector(".balance").textContent = formatYen(balance);
    });

    document.getElementById("totalIncome").textContent = formatYen(totalIncome);
    document.getElementById("totalExpense").textContent = formatYen(totalExpense);
}

function addRow(){
    let tbody = document.getElementById("tbody");
    let newRow = tbody.rows[0].cloneNode(true);

    newRow.querySelectorAll("input").forEach(input=>input.value="");
    newRow.querySelector(".balance").textContent="¥0";

    tbody.appendChild(newRow);

    newRow.querySelectorAll("input").forEach(input=>{
        input.addEventListener("input",calculate);
    });
}

function saveData(){
    let data = {
        opening: document.getElementById("opening").value,
        createdDate: document.getElementById("createdDate").value,
        rows: []
    };

    document.querySelectorAll("#tbody tr").forEach(row=>{
        data.rows.push({
            date: row.cells[0].querySelector("input").value,
            desc: row.cells[1].querySelector("input").value,
            income: row.querySelector(".income").value,
            expense: row.querySelector(".expense").value
        });
    });

    localStorage.setItem("cashbookData", JSON.stringify(data));
    alert("保存しました");
}

function loadData(){
    let saved = localStorage.getItem("cashbookData");
    if(!saved) return;

    let data = JSON.parse(saved);

    document.getElementById("opening").value = data.opening || 0;
    document.getElementById("createdDate").value = data.createdDate || "";

    let tbody = document.getElementById("tbody");
    tbody.innerHTML="";

    data.rows.forEach(rowData=>{
        let row = document.createElement("tr");
        row.innerHTML=`
        <td class="center"><input type="date" value="${rowData.date}"></td>
        <td class="left"><input type="text" value="${rowData.desc}"></td>
        <td><input type="number" class="income" value="${rowData.income}"></td>
        <td><input type="number" class="expense" value="${rowData.expense}"></td>
        <td class="balance">¥0</td>
        `;
        tbody.appendChild(row);
    });

    document.querySelectorAll("input").forEach(input=>{
        input.addEventListener("input",calculate);
    });

    calculate();
}

document.querySelectorAll("input").forEach(input=>{
    input.addEventListener("input",calculate);
});

window.addEventListener("load",loadData);
</script>

</body>
</html>
