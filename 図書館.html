<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>図書館管理システム Professional</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:"Yu Mincho","Hiragino Mincho ProN","MS Mincho",serif;
  background:#ffffff;
  color:#222;
}
h1{
  font-weight:bold;
  border-bottom:2px solid #444;
  padding-bottom:10px;
}
.card{
  border:1px solid #ccc;
  box-shadow:0 3px 8px rgba(0,0,0,0.05);
}
.overdue{ background:#ffe5e5 !important; }
.returned{ background:#f3f3f3 !important; }

@media print{
  .no-print{ display:none !important; }
  body{ font-size:12px; }
}
</style>
</head>

<body class="container py-4">

<h1 class="mb-4">📚 図書館管理システム Professional</h1>

<div class="mb-3 text-end no-print">
  <button class="btn btn-primary me-2" onclick="saveData()">💾 保存</button>
  <button class="btn btn-secondary me-2" onclick="loadData()">📂 読込</button>
  <button class="btn btn-success me-2" onclick="exportCSV()">📁 CSV出力</button>
  <button class="btn btn-info me-2" onclick="window.print()">🖨 印刷</button>
  <button class="btn btn-dark" onclick="syncWithDB()">🌐 DB同期</button>
</div>

<div class="card p-4 mb-4">
<form id="bookForm" class="row g-3">
<input type="hidden" id="editIndex">

<div class="col-md-3">
<label>書名</label>
<input type="text" id="title" class="form-control" required>
</div>

<div class="col-md-3">
<label>著者</label>
<input type="text" id="author" class="form-control" required>
</div>

<div class="col-md-2">
<label>貸出者</label>
<input type="text" id="borrower" class="form-control" required>
</div>

<div class="col-md-2">
<label>電話番号</label>
<input type="tel" id="phone" class="form-control" required>
</div>

<div class="col-md-2">
<label>貸出日</label>
<input type="date" id="borrowDate" class="form-control" required>
</div>

<div class="col-md-2">
<label>返却期限</label>
<input type="date" id="dueDate" class="form-control" required>
</div>

<div class="col-md-2 align-self-end">
<button type="submit" class="btn btn-primary w-100">登録</button>
</div>
</form>
</div>

<h4>書籍一覧</h4>
<table class="table table-bordered" id="booksTable">
<thead class="table-light">
<tr>
<th>書名</th><th>著者</th><th>貸出者</th><th>電話</th>
<th>貸出日</th><th>期限</th><th>返却</th><th>状態</th><th class="no-print">操作</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="card p-4 mt-4">
<h4>📊 貸出統計</h4>
<canvas id="statsChart" height="100"></canvas>
</div>

<script>

let books=[];
let chart;

/* ===== テーブル描画 ===== */
function renderTable(){
const tbody=document.querySelector("#booksTable tbody");
tbody.innerHTML="";
const today=new Date().toISOString().split("T")[0];

books.forEach((b,i)=>{
const tr=document.createElement("tr");

if(b.returned) tr.classList.add("returned");
else if(b.dueDate<today) tr.classList.add("overdue");

let status="貸出中";
if(b.returned) status="返却済";
else if(b.dueDate<today) status="期限切れ";

tr.innerHTML=`
<td>${b.title}</td>
<td>${b.author}</td>
<td>${b.borrower}</td>
<td>${b.phone}</td>
<td>${b.borrowDate}</td>
<td>${b.dueDate}</td>
<td class="text-center">
<input type="checkbox" ${b.returned?"checked":""} onchange="toggleReturned(${i})">
</td>
<td>${status}</td>
<td class="no-print">
<button class="btn btn-sm btn-warning me-1" onclick="editBook(${i})">編集</button>
<button class="btn btn-sm btn-danger" onclick="deleteBook(${i})">削除</button>
</td>
`;
tbody.appendChild(tr);
});
updateChart();
}

/* ===== グラフ ===== */
function updateChart(){
const total=books.length;
const returned=books.filter(b=>b.returned).length;
const overdue=books.filter(b=>!b.returned && b.dueDate < new Date().toISOString().split("T")[0]).length;
const lending=total-returned-overdue;

const data={
labels:["貸出中","返却済","期限切れ"],
datasets:[{
data:[lending,returned,overdue],
backgroundColor:["#0d6efd","#198754","#dc3545"]
}]
};

if(chart) chart.destroy();
chart=new Chart(document.getElementById("statsChart"),{
type:"pie",
data:data
});
}

/* ===== CRUD ===== */
document.getElementById("bookForm").addEventListener("submit",e=>{
e.preventDefault();

const book={
title:title.value,
author:author.value,
borrower:borrower.value,
phone:phone.value,
borrowDate:borrowDate.value,
dueDate:dueDate.value,
returned:false
};

if(editIndex.value==="") books.push(book);
else books[editIndex.value]={...books[editIndex.value],...book};

bookForm.reset();
editIndex.value="";
renderTable();
});

function editBook(i){
const b=books[i];
title.value=b.title;
author.value=b.author;
borrower.value=b.borrower;
phone.value=b.phone;
borrowDate.value=b.borrowDate;
dueDate.value=b.dueDate;
editIndex.value=i;
}

function deleteBook(i){
books.splice(i,1);
renderTable();
}

function toggleReturned(i){
books[i].returned=!books[i].returned;
renderTable();
}

/* ===== 保存 ===== */
function saveData(){
localStorage.setItem("books",JSON.stringify(books));
alert("保存しました");
}

function loadData(){
const data=localStorage.getItem("books");
if(data){
books=JSON.parse(data);
renderTable();
}
}

/* ===== CSV出力（日本語対応 UTF-8 BOM） ===== */
function exportCSV(){

const today=new Date().toISOString().split("T")[0];

let csvRows=[];
csvRows.push(["書名","著者","貸出者","電話番号","貸出日","返却期限","状態"]);

books.forEach(b=>{
let status=b.returned?"返却済":(b.dueDate<today?"期限切れ":"貸出中");
csvRows.push([
b.title,
b.author,
b.borrower,
b.phone,
b.borrowDate,
b.dueDate,
status
]);
});

/* ダブルクォート対応 */
let csvContent=csvRows.map(row =>
row.map(field =>
`"${String(field).replace(/"/g,'""')}"`
).join(",")
).join("\r\n");

/* UTF-8 BOM追加 */
const bom = new Uint8Array([0xEF,0xBB,0xBF]);
const blob = new Blob([bom, csvContent], {type:"text/csv;charset=utf-8;"});

const link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="図書館データ.csv";
link.click();
}

/* ===== DB同期（API想定） ===== */
function syncWithDB(){
fetch("https://your-api.example.com/books",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(books)
})
.then(res=>res.json())
.then(data=>alert("DB同期完了"))
.catch(()=>alert("API未接続（サーバー側実装が必要です）"));
}

window.onload=loadData;

</script>

</body>
</html>
